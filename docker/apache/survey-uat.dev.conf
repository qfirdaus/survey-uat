<VirtualHost *:80>
    ServerName survey-uat.dev
    Redirect permanent / https://survey-uat.dev/
</VirtualHost>

<VirtualHost *:443>
    ServerName survey-uat.dev

    DocumentRoot /var/www/html

    SSLEngine on
    SSLCertificateFile /etc/apache2/ssl/survey-uat.dev.crt
    SSLCertificateKeyFile /etc/apache2/ssl/survey-uat.dev.key

    <Directory /var/www/html>
        AllowOverride All
        Require all granted
        Options -Indexes
    </Directory>

    # 🔒 Block hidden files (.env, .git, etc)
    <FilesMatch "^\.">
        Require all denied
    </FilesMatch>

    # 🔒 Block sensitive files
    <FilesMatch "\.(env|log|ini|sh|sql)$">
        Require all denied
    </FilesMatch>

    ErrorLog ${APACHE_LOG_DIR}/survey_uat_error.log
    CustomLog ${APACHE_LOG_DIR}/survey_uat_access.log combined
</VirtualHost>